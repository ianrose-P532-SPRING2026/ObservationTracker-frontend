<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>ObsTrac-Logs</title>
</head>
<body>
    <h2>Logs</h2>
    
    <a href="../index.html">Back to home</a>
    <br/>

    <select id="login">
        <option value="-1">login...</option>
    </select>
    <br/>
    
    <button id="cmdButton">Open Command Log</button>
    <br/>
    <button id="auditButton">Open Audit Log</button>
    <br/>

    <dialog id="cmdLogWindow" style="height: 800px; width: 1000px;">
        <h2>Command Logs</h2>
        <ul id="cmdLogList">
            <li>
                <details>
                    <summary>1. CREATE_PATIENT, StaffGuy, 0:001:230a/23 pm</summary>
                    <div>
                        <button>Undo</button>
                        <br/>
                        <span>Payload:</span>
                        <pre>some nonsense here</pre>
                    </div>
                </details>
            </li>
        </ul>
        <button id="closeCmdLogButton">Close</button>
    </dialog>

    <script type="module" src="./script.js" defer></script>
</body>
</html>
